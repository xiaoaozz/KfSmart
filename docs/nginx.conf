# KfSmart AI Platform — production nginx configuration
# Place this at /etc/nginx/conf.d/kfsmart.conf (or include from nginx.conf)
# Assumes dist/ files are served from /var/www/kfsmart/html

gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

server {
  listen 80;
  server_name _;

  root /var/www/kfsmart/html;
  index index.html;

  # ── Security headers ─────────────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:;"
    always;

  # ── Static assets with content-hash: immutable cache ─────────────────────
  # Vite output filenames contain a hash (e.g. main-abc123.js) — safe to
  # cache forever; users always get the new hash on deploy.
  location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
    try_files $uri =404;
  }

  # ── index.html: never cache so new deploys take effect immediately ────────
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # ── SPA fallback ─────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Backend API reverse proxy ─────────────────────────────────────────────
  location /api/ {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;
    proxy_connect_timeout 10s;
  }

  # ── WebSocket connections (chat streaming, agent execution) ──────────────
  location ~ ^/(ws|chat)(/|$) {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
