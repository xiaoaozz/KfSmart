# dev profile 覆盖项（其余继承自 application.yml）
# 差异：ddl-auto=update 便于本地建表、show-sql=true、较小的切块阈值、DEBUG 日志
spring:
  datasource:
    # dev 不带 allowPublicKeyRetrieval（本地 MySQL 8 默认无需）
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/knowflow?useSSL=false&serverTimezone=UTC}
  jpa:
    hibernate:
      ddl-auto: update  # 本地便于自动建表；生产用 base 的 validate
    show-sql: true

file:
  parsing:
    chunk-size: 512  # 本地切块较小便于调试（base 为 1500）

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.boot.autoconfigure.web.servlet: DEBUG
    org.springframework.security: DEBUG
    com.smart.kf.service: DEBUG
    io.minio: DEBUG

log4j:
  logger:
    org:
      apache:
        tika=DEBUG:
